<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Real-World Examples Coverage</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #FF5500;
            text-align: center;
            margin-bottom: 30px;
        }
        .summary-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #FF5500;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-box {
            background: rgba(255, 85, 0, 0.1);
            border: 1px solid rgba(255, 85, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #FF5500;
        }
        .stat-label {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }
        .block-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .block-title {
            color: #FF5500;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 85, 0, 0.3);
            padding-bottom: 10px;
        }
        .subcomponent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .subcomponent-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s ease;
        }
        .subcomponent-card:hover {
            border-color: #FF5500;
            transform: translateY(-2px);
        }
        .subcomponent-card.has-examples {
            border-left: 4px solid #4CAF50;
        }
        .subcomponent-card.missing {
            border-left: 4px solid #f44336;
            opacity: 0.7;
        }
        .subcomponent-id {
            font-weight: bold;
            color: #FF5500;
            margin-bottom: 5px;
        }
        .subcomponent-title {
            font-size: 14px;
            color: #fff;
            margin-bottom: 8px;
        }
        .company-list {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 5px;
        }
        .status-badge.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        .status-badge.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        #console-output {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF5500, #FF8800);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🔍 Real-World Examples Coverage Verification</h1>
    
    <div class="summary-card">
        <h2>Coverage Summary</h2>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-bar" style="width: 0%">
                <span id="progress-text">0%</span>
            </div>
        </div>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="total-found">0</div>
                <div class="stat-label">Subcomponents with Examples</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="total-missing">0</div>
                <div class="stat-label">Missing Examples</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="total-examples">0</div>
                <div class="stat-label">Total Company Examples</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="coverage-percent">0%</div>
                <div class="stat-label">Coverage Percentage</div>
            </div>
        </div>
    </div>
    
    <div id="blocks-container">
        <!-- Blocks will be dynamically inserted here -->
    </div>
    
    <div style="margin-top: 30px;">
        <h3 style="color: #FF5500;">Console Output</h3>
        <div id="console-output">Loading verification script...</div>
    </div>

    <script src="real-world-examples-complete-96-final.js"></script>
    <script>
        // Capture console output
        const consoleOutput = document.getElementById('console-output');
        const originalLog = console.log;
        let outputBuffer = '';
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            outputBuffer += args.join(' ') + '\n';
            consoleOutput.textContent = outputBuffer;
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        };
        
        // Wait for database to load
        setTimeout(() => {
            console.log('🔍 Starting verification of all 96 subcomponents...\n');
            
            const blocks = [
                { id: 1, name: 'Mission Discovery' },
                { id: 2, name: 'Customer Insights' },
                { id: 3, name: 'Strategic Prioritization' },
                { id: 4, name: 'Prototype Launch' },
                { id: 5, name: 'Go-to-Market Strategy' },
                { id: 6, name: 'Customer Engagement Flywheel' },
                { id: 7, name: 'Quantifiable Impact' },
                { id: 8, name: 'Customer Success Expansion' },
                { id: 9, name: 'Proof of Execution' },
                { id: 10, name: 'Sales Team Empowerment' },
                { id: 11, name: 'High Performance Teams' },
                { id: 12, name: 'Retention Systems' },
                { id: 13, name: 'Market Domination Strategies' },
                { id: 14, name: 'Operational Infrastructure' },
                { id: 15, name: 'Leadership Expansion' },
                { id: 16, name: 'Global Expansion Opportunities' }
            ];
            
            const blocksContainer = document.getElementById('blocks-container');
            let totalFound = 0;
            let totalMissing = 0;
            let totalExamples = 0;
            
            blocks.forEach(block => {
                console.log(`\n📦 Block ${block.id}: ${block.name}`);
                console.log('─'.repeat(50));
                
                // Create block section
                const blockSection = document.createElement('div');
                blockSection.className = 'block-section';
                
                const blockTitle = document.createElement('div');
                blockTitle.className = 'block-title';
                blockTitle.textContent = `Block ${block.id}: ${block.name}`;
                blockSection.appendChild(blockTitle);
                
                const subcomponentGrid = document.createElement('div');
                subcomponentGrid.className = 'subcomponent-grid';
                
                // Check each subcomponent
                for (let sub = 1; sub <= 6; sub++) {
                    const id = `${block.id}-${sub}`;
                    const data = window.getRealWorldExamples ? 
                        window.getRealWorldExamples(id) : 
                        window.realWorldExamplesComplete?.[id];
                    
                    const card = document.createElement('div');
                    
                    if (data && data.examples && data.examples.length > 0) {
                        console.log(`✅ ${id}: ${data.title} (${data.examples.length} examples)`);
                        
                        card.className = 'subcomponent-card has-examples';
                        const companies = data.examples.map(ex => ex.company).join(', ');
                        
                        card.innerHTML = `
                            <div class="subcomponent-id">${id}</div>
                            <div class="subcomponent-title">${data.title}</div>
                            <div class="status-badge success">${data.examples.length} examples</div>
                            <div class="company-list">${companies}</div>
                        `;
                        
                        totalFound++;
                        totalExamples += data.examples.length;
                    } else {
                        console.log(`❌ ${id}: No examples found`);
                        
                        card.className = 'subcomponent-card missing';
                        card.innerHTML = `
                            <div class="subcomponent-id">${id}</div>
                            <div class="subcomponent-title">No Title Available</div>
                            <div class="status-badge error">Missing</div>
                        `;
                        
                        totalMissing++;
                    }
                    
                    subcomponentGrid.appendChild(card);
                }
                
                blockSection.appendChild(subcomponentGrid);
                blocksContainer.appendChild(blockSection);
            });
            
            // Update summary
            const coverage = ((totalFound / 96) * 100).toFixed(1);
            document.getElementById('total-found').textContent = totalFound;
            document.getElementById('total-missing').textContent = totalMissing;
            document.getElementById('total-examples').textContent = totalExamples;
            document.getElementById('coverage-percent').textContent = coverage + '%';
            
            // Update progress bar
            document.getElementById('progress-bar').style.width = coverage + '%';
            document.getElementById('progress-text').textContent = coverage + '%';
            
            // Final console summary
            console.log('\n' + '='.repeat(60));
            console.log('📊 FINAL VERIFICATION SUMMARY');
            console.log('='.repeat(60));
            console.log(`✅ Total Subcomponents with Examples: ${totalFound}/96`);
            console.log(`❌ Total Missing: ${totalMissing}/96`);
            console.log(`📈 Coverage: ${coverage}%`);
            console.log(`💼 Total Company Examples: ${totalExamples}`);
            
            if (totalFound >= 90) {
                console.log('\n🎉 SUCCESS: Excellent coverage!');
            } else if (totalFound >= 48) {
                console.log('\n✅ GOOD: Good coverage, but room for improvement.');
            } else {
                console.log('\n⚠️ NEEDS WORK: Many subcomponents missing examples.');
            }
        }, 1000);
    </script>
</body>
</html>
