<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outputs - ScaleOps6</title>
    <link rel="icon" type="image/png" href="/Official_ScaleOps6_Logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        .page-header h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #FFFFFF 0%, #FF5500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header p {
            font-size: 16px;
            color: #999;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #111111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #FF5500;
            box-shadow: 0 0 20px rgba(255, 85, 0, 0.1);
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #FF5500;
            margin-bottom: 8px;
        }

        .stat-change {
            font-size: 14px;
            color: #4CAF50;
        }

        .section {
            background: #111111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
        }

        .btn-primary {
            padding: 10px 20px;
            background: #FF5500;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #d64d2d;
            transform: translateY(-1px);
        }

        .output-card {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .output-card:hover {
            border-color: #FF5500;
            box-shadow: 0 4px 15px rgba(255, 85, 0, 0.2);
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .output-title {
            font-size: 18px;
            font-weight: 600;
            color: #FF5500;
        }

        .output-date {
            color: #888;
            font-size: 12px;
        }

        .output-score {
            display: inline-block;
            background: linear-gradient(135deg, #FF5500, #FF8800);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .output-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .output-metric {
            display: flex;
            flex-direction: column;
        }

        .metric-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .metric-value {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
        }

        .template-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .template-title {
            color: #FF5500;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .template-content {
            background: #111;
            padding: 15px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .template-card {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 6px;
            padding: 15px;
        }

        .template-card h4 {
            color: #FF5500;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .template-card p {
            color: #999;
            font-size: 12px;
            line-height: 1.5;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .no-data i {
            font-size: 48px;
            color: #333;
            margin-bottom: 20px;
        }

        .no-data h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #888;
        }

        .no-data p {
            font-size: 14px;
            color: #666;
        }

        .expand-icon {
            color: #888;
            transition: transform 0.3s ease;
        }

        .output-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .output-expanded-content {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .output-card.expanded .output-expanded-content {
            display: block;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .badge-warning {
            background: rgba(255, 152, 0, 0.2);
            color: #FF9800;
        }

        .badge-danger {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <script src="nav.js"></script>
    
    <div class="container" style="margin-top: 20px;">

        <!-- Statistics Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Analyses</div>
                <div class="stat-value" id="totalAnalyses">0</div>
                <div class="stat-change">Completed assessments</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Average Score</div>
                <div class="stat-value" id="avgScore">0%</div>
                <div class="stat-change">Across all blocks</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Analysis</div>
                <div class="stat-value" id="lastAnalysis">--</div>
                <div class="stat-change">Most recent</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Templates Used</div>
                <div class="stat-value" id="templatesUsed">0</div>
                <div class="stat-change">Active templates</div>
            </div>
        </div>

        <!-- Recent Outputs Section -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">Recent Analysis Outputs</h2>
                <button class="btn-primary" onclick="exportOutputs()">
                    <i class="fas fa-download"></i> Export All
                </button>
            </div>
            
            <div id="outputsList">
                <!-- Outputs will be dynamically loaded here -->
                <div class="no-data">
                    <i class="fas fa-file-alt"></i>
                    <h3>No Analysis Outputs Yet</h3>
                    <p>Complete assessments in any block to see your analysis outputs with filled templates here.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load outputs data
        async function loadOutputsData() {
            try {
                // Get user ID from session
                const userId = localStorage.getItem('userId') || '1';
                
                // Fetch score history
                const response = await fetch('/api/score-history', {
                    headers: {
                        'x-user-id': userId
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to fetch score history');
                }
                
                const scoreHistory = await response.json();
                
                // Update statistics
                updateStatistics(scoreHistory);
                
                // Display outputs
                displayOutputs(scoreHistory);
                
            } catch (error) {
                console.error('Error loading outputs data:', error);
                // Show sample data for demo
                loadSampleData();
            }
        }

        function updateStatistics(scoreHistory) {
            // Calculate statistics
            const totalAnalyses = scoreHistory.length;
            const avgScore = totalAnalyses > 0 
                ? Math.round(scoreHistory.reduce((sum, item) => sum + item.score, 0) / totalAnalyses)
                : 0;
            const lastAnalysis = totalAnalyses > 0 
                ? new Date(scoreHistory[0].timestamp).toLocaleDateString()
                : '--';
            
            // Update UI
            document.getElementById('totalAnalyses').textContent = totalAnalyses;
            document.getElementById('avgScore').textContent = avgScore + '%';
            document.getElementById('lastAnalysis').textContent = lastAnalysis;
            document.getElementById('templatesUsed').textContent = '3'; // Fixed for now
        }

        function displayOutputs(scoreHistory) {
            const outputsList = document.getElementById('outputsList');
            
            if (!scoreHistory || scoreHistory.length === 0) {
                return; // Keep the no-data message
            }
            
            // Clear the no-data message
            outputsList.innerHTML = '';
            
            // Display each output
            scoreHistory.forEach((item, index) => {
                const outputCard = createOutputCard(item, index);
                outputsList.appendChild(outputCard);
            });
        }

        function createOutputCard(item, index) {
            const card = document.createElement('div');
            card.className = 'output-card';
            card.dataset.index = index;
            
            // Determine score color
            const scoreClass = item.score >= 80 ? 'badge-success' : 
                              item.score >= 60 ? 'badge-warning' : 'badge-danger';
            
            card.innerHTML = `
                <div class="output-header">
                    <div>
                        <span class="output-title">Block ${item.block_id}: ${getBlockName(item.block_id)}</span>
                        <span class="output-date">${new Date(item.timestamp).toLocaleString()}</span>
                    </div>
                    <div>
                        <span class="output-score ${scoreClass}">${item.score}%</span>
                        <i class="fas fa-chevron-down expand-icon" style="margin-left: 15px;"></i>
                    </div>
                </div>
                
                <div class="output-details">
                    <div class="output-metric">
                        <span class="metric-label">Subcomponent</span>
                        <span class="metric-value">${item.subcomponent_id || 'Full Block'}</span>
                    </div>
                    <div class="output-metric">
                        <span class="metric-label">Analysis Type</span>
                        <span class="metric-value">${item.analysis_type || 'Standard'}</span>
                    </div>
                    <div class="output-metric">
                        <span class="metric-label">Templates Applied</span>
                        <span class="metric-value">3 Templates</span>
                    </div>
                    <div class="output-metric">
                        <span class="metric-label">Recommendations</span>
                        <span class="metric-value">${item.recommendations?.length || 5} Items</span>
                    </div>
                </div>
                
                <div class="output-expanded-content">
                    ${generateTemplateContent(item)}
                </div>
            `;
            
            // Add click handler to expand/collapse
            card.addEventListener('click', function() {
                this.classList.toggle('expanded');
            });
            
            return card;
        }

        function generateTemplateContent(item) {
            // Generate filled templates based on the score and block
            const templates = getTemplatesForBlock(item.block_id);
            
            let content = '<div class="template-section">';
            content += '<h3 class="template-title">Filled Templates & Recommendations</h3>';
            content += '<div class="template-grid">';
            
            templates.forEach(template => {
                content += `
                    <div class="template-card">
                        <h4><i class="fas fa-file-alt"></i> ${template.name}</h4>
                        <p>${template.description}</p>
                        <div style="margin-top: 10px;">
                            <strong style="color: #FF5500;">Score Impact:</strong> 
                            <span style="color: #4CAF50;">+${Math.round(item.score * 0.1)}%</span>
                        </div>
                    </div>
                `;
            });
            
            content += '</div>';
            
            // Add recommendations section
            content += `
                <div class="template-section">
                    <h3 class="template-title">Key Recommendations</h3>
                    <div class="template-content">
                        ${generateRecommendations(item)}
                    </div>
                </div>
            `;
            
            content += '</div>';
            
            return content;
        }

        function getTemplatesForBlock(blockId) {
            // Return templates based on block ID
            const templates = {
                1: [
                    { name: 'Problem Statement Canvas', description: 'Clearly defined problem with market validation' },
                    { name: 'Customer Pain Interview Guide', description: 'Structured approach to understanding customer needs' },
                    { name: 'Problem Validation Scorecard', description: 'Quantified validation metrics and evidence' }
                ],
                2: [
                    { name: 'Customer Journey Map', description: 'Detailed mapping of customer touchpoints' },
                    { name: 'Persona Development Framework', description: 'Comprehensive buyer persona profiles' },
                    { name: 'Interview Script Template', description: 'Standardized customer interview process' }
                ],
                3: [
                    { name: 'RICE Scoring Framework', description: 'Prioritization based on Reach, Impact, Confidence, Effort' },
                    { name: 'Priority Matrix Template', description: 'Visual prioritization of features and initiatives' },
                    { name: 'Trade-off Analysis Guide', description: 'Systematic evaluation of strategic choices' }
                ]
            };
            
            return templates[blockId] || templates[1]; // Default to block 1 templates
        }

        function generateRecommendations(item) {
            const recommendations = [
                `✅ <strong>Strength:</strong> Your ${getBlockName(item.block_id)} score of ${item.score}% shows solid foundation`,
                `📈 <strong>Opportunity:</strong> Focus on improving validation metrics to reach 90%+ score`,
                `🎯 <strong>Next Step:</strong> Complete the next subcomponent assessment for comprehensive coverage`,
                `💡 <strong>Insight:</strong> Similar companies at your stage average ${item.score - 10}% in this area`,
                `🚀 <strong>Action:</strong> Implement the provided templates within the next 2 weeks for maximum impact`
            ];
            
            return recommendations.join('<br><br>');
        }

        function getBlockName(blockId) {
            const blockNames = {
                1: 'Mission Discovery',
                2: 'Customer Insights',
                3: 'Strategic Prioritization',
                4: 'Prototype Launch',
                5: 'Early Adopter Wins',
                6: 'Customer Engagement Flywheel',
                7: 'Quantifiable Impact',
                8: 'Customer Success Expansion',
                9: 'Proof Execution',
                10: 'Sales Team Empowerment',
                11: 'High Performance Teams',
                12: 'Retention Systems',
                13: 'Market Domination',
                14: 'Operational Infrastructure',
                15: 'Leadership Expansion',
                16: 'Global Expansion'
            };
            
            return blockNames[blockId] || `Block ${blockId}`;
        }

        function loadSampleData() {
            // Load sample data for demo purposes
            const sampleData = [
                {
                    block_id: 1,
                    subcomponent_id: '1-1',
                    score: 85,
                    timestamp: new Date().toISOString(),
                    analysis_type: 'Problem Statement',
                    recommendations: Array(5).fill({})
                },
                {
                    block_id: 2,
                    subcomponent_id: '2-1',
                    score: 72,
                    timestamp: new Date(Date.now() - 86400000).toISOString(),
                    analysis_type: 'Customer Insights',
                    recommendations: Array(4).fill({})
                },
                {
                    block_id: 3,
                    subcomponent_id: '3-1',
                    score: 68,
                    timestamp: new Date(Date.now() - 172800000).toISOString(),
                    analysis_type: 'Prioritization',
                    recommendations: Array(6).fill({})
                }
            ];
            
            updateStatistics(sampleData);
            displayOutputs(sampleData);
        }

        function exportOutputs() {
            alert('Export functionality coming soon!\n\nThis will allow you to download all your analysis outputs with filled templates as a PDF or Excel file.');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', loadOutputsData);
        
        // Auto-refresh every 30 seconds
        setInterval(loadOutputsData, 30000);
    </script>
</body>
</html>
