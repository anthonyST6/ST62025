<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleOps6 - Subcomponent Detail</title>
    <link rel="icon" type="image/png" href="/Official_ScaleOps6_Logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
            padding-top: 140px;
            position: relative;
        }

        /* Soft orange glow effect */
        body::before {
            content: '';
            position: fixed;
            bottom: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 150%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255, 85, 0, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Breadcrumb Navigation */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #999;
        }

        .breadcrumb a {
            color: #FF5500;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .breadcrumb a:hover {
            opacity: 0.8;
        }

        .breadcrumb .separator {
            color: #666;
        }

        /* Header Section */
        .subcomponent-header {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid #FF5500;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
        }

        .subcomponent-number {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: #666;
            font-weight: 700;
        }

        .subcomponent-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: #FF5500;
        }

        .subcomponent-description {
            font-size: 18px;
            color: #ccc;
            line-height: 1.6;
        }

        /* Tab Navigation */
        .tab-navigation {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .tab-button {
            padding: 15px 25px;
            background: transparent;
            color: #999;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .tab-button:hover {
            color: #FF5500;
        }

        .tab-button.active {
            color: #FF5500;
            border-bottom-color: #FF5500;
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Educational Content Section */
        .education-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #FF5500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            font-size: 28px;
        }

        .section-content {
            font-size: 16px;
            line-height: 1.8;
            color: #ccc;
        }

        /* Interactive Workspace */
        .workspace-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        /* Resources Section */
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .resource-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .resource-card:hover {
            transform: translateY(-3px);
            border-color: #FF5500;
            background: rgba(255, 85, 0, 0.05);
        }

        /* Action Buttons */
        .btn-primary {
            background: #FF5500;
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #d64d2d;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: #FF5500;
            border: 2px solid #FF5500;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(255, 85, 0, 0.1);
        }
    </style>
</head>
<body>
    <script src="nav.js"></script>
    
    <div class="container">
        <!-- Breadcrumb Navigation -->
        <div class="breadcrumb">
            <a href="/">Dashboard</a>
            <span class="separator">›</span>
            <a href="#" id="block-link">Block</a>
            <span class="separator">›</span>
            <span id="subcomponent-name">Subcomponent</span>
        </div>

        <!-- Subcomponent Header -->
        <div class="subcomponent-header">
            <div class="subcomponent-number" id="subcomponent-number">1.1</div>
            <h1 class="subcomponent-title" id="subcomponent-title">LOADING...</h1>
            <p class="subcomponent-description" id="subcomponent-description">
                Loading description...
            </p>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-navigation">
            <button class="tab-button active" data-tab="education" onclick="switchTab('education')">📚 Education</button>
            <button class="tab-button" data-tab="workspace" onclick="switchTab('workspace')">✏️ Workspace</button>
            <button class="tab-button" data-tab="analysis" onclick="switchTab('analysis')">🤖 Analysis</button>
            <button class="tab-button" data-tab="output" onclick="switchTab('output')">📋 Output</button>
            <button class="tab-button" data-tab="resources" onclick="switchTab('resources')">🔧 Resources</button>
            <button class="tab-button" data-tab="history" onclick="switchTab('history')">📊 Score History</button>
        </div>

        <!-- Education Tab -->
        <div id="education-tab" class="tab-content active">
            <div id="education-loading" style="text-align: center; padding: 60px 20px;">
                <div style="font-size: 48px; margin-bottom: 20px; animation: pulse 1.5s infinite;">📚</div>
                <h3 style="font-size: 24px; margin-bottom: 10px; color: #FF5500;">Loading Educational Content...</h3>
                <p style="font-size: 16px; color: #999;">Fetching agent-specific GTM best practices and frameworks</p>
            </div>
        </div>

        <!-- Workspace Tab -->
        <div id="workspace-tab" class="tab-content">
            <div class="workspace-section">
                <h2 class="section-title">
                    <span class="section-icon">📝</span>
                    Interactive Worksheet
                </h2>
                <div id="dynamic-worksheet-container">
                    <!-- Dynamic worksheet will be injected here -->
                </div>
            </div>
        </div>

        <!-- Analysis Tab -->
        <div id="analysis-tab" class="tab-content">
            <div class="workspace-section">
                <h2 class="section-title">
                    <span class="section-icon">🤖</span>
                    Analysis Results
                </h2>
                <div id="analysis-content" style="min-height: 400px;">
                    <!-- Analysis results will be displayed here -->
                </div>
            </div>
        </div>

        <!-- Output Tab -->
        <div id="output-tab" class="tab-content">
            <div class="workspace-section">
                <h2 class="section-title">
                    <span class="section-icon">📋</span>
                    Template Outputs
                </h2>
                <div id="output-content" style="min-height: 400px;">
                    <!-- Template outputs will be displayed here -->
                </div>
            </div>
        </div>

        <!-- Resources Tab -->
        <div id="resources-tab" class="tab-content">
            <div class="workspace-section">
                <h2 class="section-title">
                    <span class="section-icon">📄</span>
                    Templates & Frameworks
                </h2>
                <div id="resource-templates" class="templates-list">
                    <!-- Templates will be dynamically loaded here -->
                </div>
            </div>
        </div>

        <!-- Score History Tab -->
        <div id="history-tab" class="tab-content">
            <div class="workspace-section">
                <h2 class="section-title">
                    <span class="section-icon">📊</span>
                    Score History & Progress
                </h2>
                <div id="score-history-content" style="min-height: 400px;">
                    <!-- Score history will be displayed here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get subcomponent ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const subcomponentId = urlParams.get('id') || '1-1';
        const blockId = parseInt(subcomponentId.split('-')[0]);

        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active from all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            const selectedTab = document.getElementById(`${tabName}-tab`);
            if (selectedTab) {
                selectedTab.classList.add('active');
            }
            
            // Activate the correct button
            document.querySelector(`[data-tab="${tabName}"]`)?.classList.add('active');
        }

        // Function to update the Education tab with ORIGINAL GRID LAYOUT
        function updateEducationTab(education) {
            const educationTab = document.getElementById('education-tab');
            if (!educationTab) return;
            
            // Build the education content HTML with EXACT ORIGINAL STRUCTURE
            let educationHTML = '';
            
            // What is section - using agent data
            educationHTML += `
                <div class="education-section">
                    <h2 class="section-title">
                        <span class="section-icon">🎯</span>
                        What is ${education.title || 'this component'}?
                    </h2>
                    <div class="section-content">
                        ${education.what || '<p>Loading content...</p>'}
                    </div>
                </div>
            `;
            
            // Why It Matters section - using agent data
            educationHTML += `
                <div class="education-section">
                    <h2 class="section-title">
                        <span class="section-icon">💡</span>
                        Why It Matters
                    </h2>
                    <div class="section-content">
                        ${education.why || '<p>Loading content...</p>'}
                    </div>
                </div>
            `;
            
            // How to Implement section with ORIGINAL GRID LAYOUT
            educationHTML += `
                <div class="education-section">
                    <h2 class="section-title">
                        <span class="section-icon">🚀</span>
                        How to Implement
                    </h2>
                    <div class="section-content" style="padding-top: 10px;">
                        ${education.how || ''}
                        
                        <!-- ORIGINAL Side by side grid layout -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px;">
                            <!-- Key Components -->
                            <div style="background: rgba(0, 0, 0, 0.5); border-radius: 12px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; cursor: pointer;"
                                 onmouseover="this.style.borderColor='#FF5500'; this.style.background='rgba(255, 85, 0, 0.05)'; this.style.transform='translateY(-2px)'"
                                 onmouseout="this.style.borderColor='rgba(255, 255, 255, 0.1)'; this.style.background='rgba(0, 0, 0, 0.5)'; this.style.transform='translateY(0)'">
                                <h3 style="color: #FF5500; margin-bottom: 20px; font-size: 18px; border-bottom: 1px solid rgba(255, 85, 0, 0.3); padding-bottom: 10px;">
                                    Key Components:
                                </h3>
                                <div style="display: flex; flex-direction: column; gap: 0;">
                                    ${education.keyComponents ? education.keyComponents.map((comp, i) => `
                                    <div style="padding: 15px 0; ${i < education.keyComponents.length - 1 ? 'border-bottom: 1px solid rgba(255, 255, 255, 0.05);' : ''} display: flex; align-items: flex-start; gap: 15px; transition: all 0.3s ease;"
                                         onmouseover="this.style.paddingLeft='10px'; this.style.background='rgba(255, 85, 0, 0.03)'"
                                         onmouseout="this.style.paddingLeft='0'; this.style.background='transparent'">
                                        <span style="color: #FF5500; font-weight: 700; font-size: 18px; min-width: 25px;">${i + 1}.</span>
                                        <div style="flex: 1;">
                                            <strong style="color: #fff; font-size: 15px;">${comp.title || comp}</strong>
                                            ${comp.description ? `<p style="margin-top: 5px; font-size: 13px; color: #999; margin-bottom: 0; line-height: 1.5;">${comp.description}</p>` : ''}
                                        </div>
                                    </div>
                                    `).join('') : ''}
                                </div>
                            </div>
                            
                            <!-- Best Practices -->
                            <div style="background: rgba(0, 0, 0, 0.5); border-radius: 12px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; cursor: pointer;"
                                 onmouseover="this.style.borderColor='#FF5500'; this.style.background='rgba(255, 85, 0, 0.05)'; this.style.transform='translateY(-2px)'"
                                 onmouseout="this.style.borderColor='rgba(255, 255, 255, 0.1)'; this.style.background='rgba(0, 0, 0, 0.5)'; this.style.transform='translateY(0)'">
                                <h3 style="color: #FF5500; margin-bottom: 20px; font-size: 18px; border-bottom: 1px solid rgba(255, 85, 0, 0.3); padding-bottom: 10px;">
                                    Best Practices:
                                </h3>
                                <div style="display: flex; flex-direction: column; gap: 0;">
                                    ${education.bestPractices ? education.bestPractices.map((practice, i) => `
                                    <div style="padding: 15px 0; ${i < education.bestPractices.length - 1 ? 'border-bottom: 1px solid rgba(255, 255, 255, 0.05);' : ''} display: flex; align-items: flex-start; gap: 15px; transition: all 0.3s ease;"
                                         onmouseover="this.style.paddingLeft='10px'; this.style.background='rgba(76, 175, 80, 0.03)'"
                                         onmouseout="this.style.paddingLeft='0'; this.style.background='transparent'">
                                        <span style="color: #4CAF50; font-size: 20px; min-width: 25px;">✓</span>
                                        <div style="flex: 1;">
                                            <strong style="color: #fff; font-size: 15px;">${practice.title || practice}</strong>
                                            ${practice.description ? `<p style="margin-top: 5px; font-size: 13px; color: #999; margin-bottom: 0; line-height: 1.5;">${practice.description}</p>` : ''}
                                        </div>
                                    </div>
                                    `).join('') : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Real-World Examples section with ORIGINAL GRID LAYOUT
            if (education.examples && education.examples.length > 0) {
                educationHTML += `
                    <div class="education-section">
                        <h2 class="section-title">
                            <span class="section-icon">💼</span>
                            Real-World Examples
                        </h2>
                        <div class="section-content">
                            <p style="margin-bottom: 25px; color: #ccc; line-height: 1.6;">Learn from successful implementations:</p>
                            
                            <!-- ORIGINAL Grid layout for case studies -->
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; margin-top: 20px;">
                                ${education.examples.map(example => `
                                <div style="background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.5)); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 25px; transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden; min-height: 280px;"
                                     onmouseover="this.style.borderColor='#FF5500'; this.style.transform='translateY(-5px)'; this.style.boxShadow='0 10px 30px rgba(255, 85, 0, 0.3)'"
                                     onmouseout="this.style.borderColor='rgba(255, 255, 255, 0.1)'; this.style.transform='translateY(0)'; this.style.boxShadow='none'">
                                    <div style="position: absolute; top: 0; right: 0; width: 100px; height: 100px; background: radial-gradient(circle at top right, rgba(255, 85, 0, 0.2), transparent); pointer-events: none;"></div>
                                    <h3 style="color: #FF5500; margin-bottom: 15px; font-size: 22px; font-weight: 700;">${example.company || example.title || 'Example'}</h3>
                                    <div style="background: rgba(255, 85, 0, 0.1); border-left: 3px solid #FF5500; padding: 15px; margin-bottom: 15px; border-radius: 5px; flex: 1;">
                                        <p style="color: #fff; font-weight: 600; margin-bottom: 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;">Implementation:</p>
                                        <p style="color: #ccc; line-height: 1.7; font-size: 13px;">
                                            ${example.description || example.implementation || example}
                                        </p>
                                    </div>
                                    ${example.result ? `
                                    <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                                        <span style="color: #4CAF50; font-size: 24px; font-weight: 700;">${example.result}</span>
                                        <span style="color: #999; font-size: 13px;">Result</span>
                                    </div>
                                    ` : ''}
                                </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Update the education tab content
            educationTab.innerHTML = educationHTML;
        }

        // Load subcomponent data from API
        async function loadSubcomponentData() {
            try {
                const response = await fetch(`/api/subcomponents/${subcomponentId}`);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Loaded agent data:', data);
                    
                    // Update header
                    document.getElementById('subcomponent-title').textContent = (data.education?.title || data.name || 'SUBCOMPONENT').toUpperCase();
                    document.getElementById('subcomponent-description').textContent = data.description || '';
                    document.getElementById('subcomponent-number').textContent = subcomponentId.replace('-', '.');
                    document.getElementById('subcomponent-name').textContent = data.education?.title || data.name || 'Subcomponent';
                    
                    // Update block link
                    const blockLink = document.getElementById('block-link');
                    if (blockLink) {
                        blockLink.textContent = data.blockName || 'Block';
                        blockLink.href = `block-detail.html?id=${blockId}`;
                    }
                    
                    // Update education tab with agent data
                    if (data.education) {
                        updateEducationTab(data.education);
                    }
                    
                    // Load workspace questions
                    if (data.workspace && data.workspace.questions) {
                        loadWorkspaceQuestions(data.workspace.questions);
                    }
                    
                    // Load templates
                    if (data.templates) {
                        loadTemplates(data.templates);
                    }
                    
                    // Load resources
                    if (data.resources) {
                        loadResources(data.resources);
                    }
                }
            } catch (error) {
                console.error('Error loading subcomponent data:', error);
                document.getElementById('education-tab').innerHTML = `
                    <div style="text-align: center; padding: 60px 20px; color: #999;">
                        <div style="font-size: 48px; margin-bottom: 20px;">❌</div>
                        <h3 style="font-size: 24px; margin-bottom: 10px; color: #FF5500;">Error Loading Content</h3>
                        <p style="font-size: 16px;">${error.message}</p>
                    </div>
                `;
            }
        }

        // Load workspace questions
        function loadWorkspaceQuestions(questions) {
            const container = document.getElementById('dynamic-worksheet-container');
            if (!container || !questions) return;
            
            let html = '<div style="display: flex; flex-direction: column; gap: 20px;">';
            questions.forEach((q, index) => {
                html += `
                    <div style="background: rgba(0, 0, 0, 0.5); border-radius: 10px; padding: 20px;">
                        <label style="display: block; color: #FF5500; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; font-size: 14px;">
                            ${index + 1}. ${q.question || q}
                        </label>
                        <textarea style="width: 100%; min-height: 100px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: #fff; padding: 12px; font-size: 14px;" 
                                  placeholder="Enter your response..."></textarea>
                    </div>
                `;
            });
            html += '</div>';
            html += `
                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button class="btn-primary" onclick="saveWorksheet()">Save Progress</button>
                    <button class="btn-primary" style="background: #4CAF50;" onclick="analyzeWorksheet()">🤖 Analyze Results</button>
                </div>
            `;
            container.innerHTML = html;
        }

        // Load templates
        function loadTemplates(templates) {
            const container = document.getElementById('resource-templates');
            if (!container || !templates) return;
            
            let html = '';
            templates.forEach(template => {
                const templateName = typeof template === 'string' ? template : template.name;
                html += `
                    <div style="background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h4 style="color: #fff; margin-bottom: 5px;">${templateName}</h4>
                            <p style="color: #999; font-size: 13px;">Ready-to-use template for your GTM needs</p>
                        </div>
                        <button class="btn-primary" style="padding: 8px 20px; font-size: 14px;">Download</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Load resources
        function loadResources(resources) {
            // Implementation for resources if needed
        }

        // Placeholder functions
        function saveWorksheet() {
            alert('Worksheet saved!');
        }

        function analyzeWorksheet() {
            switchTab('analysis');
            document.getElementById('analysis-content').innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <div style="font-size: 48px; margin-bottom: 20px;">🤖</div>
                    <h3 style="font-size: 24px; margin-bottom: 10px; color: #FF5500;">Analyzing Your Responses...</h3>
                    <p style="font-size: 16px; color: #999;">Our AI agent is evaluating your submission</p>
                </div>
            `;
            
            // Simulate analysis
            setTimeout(() => {
                document.getElementById('analysis-content').innerHTML = `
                    <div style="background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 30px;">
                        <h3 style="color: #FF5500; font-size: 24px; margin-bottom: 20px;">Analysis Complete</h3>
                        <div style="font-size: 48px; font-weight: 700; color: #4CAF50; margin-bottom: 20px;">85%</div>
                        <p style="color: #ccc; line-height: 1.8;">Your implementation shows strong understanding of the concepts. Continue refining your approach based on the recommendations below.</p>
                    </div>
                `;
            }, 2000);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadSubcomponentData();
        });
    </script>
</body>
</html>
